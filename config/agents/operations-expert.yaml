template_kind: agent_contract
template_version: '1.0'
agent:
  id: operations-expert
  display_name: Operations Specialist
  owner: operations-domain
  version: '0.1.0'
  purpose: Check account status, draft service requests, coordinate branch actions
  risk_tier: medium
scope:
  users: ['bank_officer', 'ops_staff', 'demo_user']
  tenants: shb-demo
  in_scope:
    - account_status
    - service_request_draft
    - ops_sop_rag
    - branch_notify_draft
  prohibited:
    - execute_transfer
    - finalize_limit_change_without_hitl
input_contract:
  schema_reference: schemas/ops_task.v1
  classifications_allowed: [internal, customer_financial]
  max_size: 64kb
output_contract:
  schema_reference: schemas/ops_action_plan.v1
  required_evidence: [tool_result_refs, sop_citations, draft_ids]
  canonical_stream_contract: docs/architecture/audit-observability.md
planning:
  mode: bounded_adaptive_loop
  max_steps: 8
  timeout: 120s
  replanning_boundary: within_ops_tools_only
tools:
  allowlist:
    - get_account_status@v1
    - create_service_request_draft@v1
    - search_operations_sop@v1
    - notify_branch@v1
  default_write_policy: require_approval
memory:
  policy_reference: config/policies/memory-default.yaml
  context_budget: 8000
guardrails:
  hitl_policy_reference: config/policies/hitl-default.yaml
  confidence_escalation_threshold: 0.75
  cost_budget: 'USD 0.5 per run demo'
  rate_limit: 60 tool calls per run
runtime_portability:
  required_ports: [ChatRuntime, MemoryStore, ToolRegistry, WorkflowRuntime]
  public_contract_must_not_expose_vendor_types: true
audit:
  event_schema_reference: docs/architecture/audit-observability.md
  retention_policy_reference: config/policies/audit-retention.yaml
evaluation:
  dataset_reference: docs/demo/benchmark-cases.md
  acceptance_thresholds:
    task_success: 0.85
    unsafe_action_rate: 0
    cross_tenant_leakage: '0'
operations:
  kill_switch_owner: platform-oncall
  runbook_reference: docs/demo/runbook.md
  support_slo: demo-only
