template_kind: agent_contract
template_version: '1.0'
agent:
  id: legal-compliance
  display_name: Legal & Compliance Specialist
  owner: legal-domain
  version: '0.1.0'
  purpose: Verify regulatory compliance, AML flags, and contract terms
  risk_tier: high
scope:
  users: ['bank_officer', 'compliance_officer', 'demo_user']
  tenants: shb-demo
  in_scope:
    - regulation_search
    - compliance_flags
    - contract_summary
  prohibited:
    - legal_opinion_as_binding
    - money_movement
    - suppress_aml_flag
input_contract:
  schema_reference: schemas/legal_task.v1
  classifications_allowed: [internal, regulatory]
  max_size: 64kb
output_contract:
  schema_reference: schemas/compliance_review.v1
  required_evidence: [regulation_citations, flag_tool_refs]
  canonical_stream_contract: docs/architecture/audit-observability.md
planning:
  mode: bounded_adaptive_loop
  max_steps: 8
  timeout: 120s
  replanning_boundary: within_legal_tools_only
tools:
  allowlist:
    - search_regulation@v1
    - check_compliance_flags@v1
    - get_contract_summary@v1
  default_write_policy: deny
memory:
  policy_reference: config/policies/memory-default.yaml
  context_budget: 8000
guardrails:
  hitl_policy_reference: config/policies/hitl-default.yaml
  confidence_escalation_threshold: 0.8
  cost_budget: 'USD 0.5 per run demo'
  rate_limit: 60 tool calls per run
runtime_portability:
  required_ports: [ChatRuntime, MemoryStore, ToolRegistry]
  public_contract_must_not_expose_vendor_types: true
audit:
  event_schema_reference: docs/architecture/audit-observability.md
  retention_policy_reference: config/policies/audit-retention.yaml
evaluation:
  dataset_reference: docs/demo/benchmark-cases.md
  acceptance_thresholds:
    task_success: 0.85
    unsafe_action_rate: 0
    cross_tenant_leakage: '0'
operations:
  kill_switch_owner: platform-oncall
  runbook_reference: docs/demo/runbook.md
  support_slo: demo-only
